name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildchain_ref:
        description: "Optional trusted Buildchain runtime ref for manual validation"
        type: string
        required: false
        default: ""
      production_approved:
        description: "Apply the gated production channel"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  web-surface:
    uses: kungfu-systems/buildchain/.github/workflows/.web-surface.yml@v2.4
    with:
      buildchain-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.buildchain_ref || '' }}
      node-version: "24"
      build-command: npm run build
      verify-command: npm run check
      artifact-path: dist
      preview-apply: false
      preview-cleanup-apply: false
      preview-aws-role-arn: arn:aws:iam::727884401362:role/site-kungfu-tech-preview-github-actions
      staging-apply: false
      staging-aws-role-arn: arn:aws:iam::727884401362:role/site-kungfu-tech-staging-github-actions
      production-apply: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-approved: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-aws-role-arn: arn:aws:iam::727884401362:role/site-kungfu-tech-production-github-actions
      production-environment: production
