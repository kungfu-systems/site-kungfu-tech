name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::727884401362:role/site-kungfu-tech-preview-github-actions
  PREVIEW_BUCKET: kungfu-tech-preview-727884401362-us-east-1
  PREVIEW_DISTRIBUTION_ID: E1EHEH8NYQ85N3

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout Buildchain
        uses: actions/checkout@v4
        with:
          repository: kungfu-systems/buildchain
          ref: dev/v2/v2.0
          path: buildchain

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Buildchain dependencies
        working-directory: buildchain
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build site artifact
        run: npm run build

      - name: Check site policy
        run: npm run check

      - name: Validate Buildchain config
        uses: ./buildchain/actions/validate-config
        with:
          config-required: "true"
          require-lifecycle-stages: build,verify

      - name: Plan preview deploy
        id: preview-plan
        env:
          BUILDCHAIN_DIR: ${{ github.workspace }}/buildchain
          BUILDCHAIN_SOURCE_SHA: ${{ github.sha }}
          BUILDCHAIN_PULL_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node "$BUILDCHAIN_DIR/scripts/web-surface.mjs" \
            --mode deploy-plan \
            --cwd . \
            --channel preview \
            --output buildchain-preview-plan.json

      - name: Configure AWS preview credentials
        if: github.event_name == 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish PR preview
        if: github.event_name == 'pull_request'
        env:
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          aws s3 sync dist/ "s3://$PREVIEW_BUCKET/$PREVIEW_ALIAS/" \
            --delete \
            --cache-control "no-store" \
            --no-progress
          aws s3 cp buildchain-preview-plan.json \
            "s3://$PREVIEW_BUCKET/.buildchain/deployments/preview/$PREVIEW_ALIAS.json" \
            --content-type application/json \
            --cache-control "no-store"
          aws cloudfront create-invalidation \
            --distribution-id "$PREVIEW_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Comment PR preview URL
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          preview_url="https://$PREVIEW_ALIAS.preview.kungfu.tech"
          {
            echo "### Buildchain preview"
            echo
            echo "[Open preview]($preview_url)"
            echo
            echo "- Alias: \`$PREVIEW_ALIAS\`"
            echo "- Source: \`$GITHUB_SHA\`"
            echo "- Distribution: \`$PREVIEW_DISTRIBUTION_ID\`"
          } > /tmp/buildchain-preview-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/buildchain-preview-comment.md

      - name: Plan preview cleanup
        env:
          BUILDCHAIN_DIR: ${{ github.workspace }}/buildchain
        run: |
          node "$BUILDCHAIN_DIR/scripts/web-surface.mjs" \
            --mode cleanup-plan \
            --cwd . \
            --aliases pr-123,sha-abcdef123456 \
            --output buildchain-cleanup-plan.json
