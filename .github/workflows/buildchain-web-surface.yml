name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      buildchain_ref:
        description: "Optional trusted Buildchain runtime ref for manual validation"
        type: string
        required: false
        default: ""
      production_approved:
        description: "Apply the gated production channel for trusted manual dispatch"
        type: boolean
        required: false
        default: false

permissions:
  actions: read
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  web-surface:
    uses: kungfu-systems/buildchain/.github/workflows/.web-surface.yml@v2
    with:
      buildchain-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.buildchain_ref || ((((github.event_name == 'workflow_dispatch' && inputs.production_approved) || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'buildchain-release')))) && 'v2' || 'v2-alpha') }}
      buildchain-contract-lock-path: ${{ (((github.event_name == 'workflow_dispatch' && inputs.buildchain_ref == 'v2') || (github.event_name == 'workflow_dispatch' && inputs.production_approved) || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'buildchain-release')))) && '.buildchain/contract-lock.json' || '.buildchain/alpha-contract-lock.json' }}
      buildchain-contract-compatibility-policy: major-compatible
      buildchain-contract-drift-issue-mode: compatible-and-breaking
      node-version: "24"
      build-command: pnpm run build
      verify-command: pnpm run check
      artifact-path: dist
      preview-apply: true
      preview-cleanup-apply: true
      preview-aws-role-arn: arn:aws:iam::727884401362:role/site-kungfu-tech-preview-github-actions
      staging-apply: true
      staging-aws-role-arn: arn:aws:iam::727884401362:role/site-kungfu-tech-staging-github-actions
      production-apply: true
      production-approved: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-release-on-main: true
      production-release-app-client-id: ${{ vars.KUNGFU_RELEASE_APP_CLIENT_ID }}
      production-release-label: buildchain-release
      production-release-head-prefix: feature/release-
      production-aws-role-arn: arn:aws:iam::727884401362:role/site-kungfu-tech-production-github-actions
      production-environment: production
    secrets:
      production-release-app-private-key: ${{ secrets.KUNGFU_RELEASE_APP_PRIVATE_KEY }}
