name: Buildchain Web Surface

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production_approved:
        description: "Plan the gated production channel"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  web-surface:
    uses: kungfu-systems/buildchain/.github/workflows/.web-surface.yml@v2.0-alpha
    with:
      buildchain-ref: v2.0-alpha
      node-version: "24"
      build-command: npm run build
      verify-command: npm run check
      artifact-path: dist
      production-approved: ${{ github.event_name == 'workflow_dispatch' && inputs.production_approved }}
      production-environment: production

  preview-apply:
    name: Apply pull request preview
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout site
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Checkout Buildchain runtime
        uses: actions/checkout@v7.0.0
        with:
          repository: kungfu-systems/buildchain
          ref: v2.0-alpha
          path: .buildchain/runtime
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable pnpm
          pnpm --version

      - name: Install Buildchain runtime
        working-directory: .buildchain/runtime
        run: pnpm install --frozen-lockfile

      - name: Build site artifact
        run: npm run build

      - name: Check site policy
        run: npm run check

      - name: Validate web-surface config
        run: >-
          node .buildchain/runtime/scripts/web-surface.mjs
          --mode validate
          --cwd .

      - name: Plan preview deploy
        run: >-
          node .buildchain/runtime/scripts/web-surface.mjs
          --mode deploy-plan
          --cwd .
          --channel preview
          --source-sha "${{ github.event.pull_request.head.sha }}"
          --pull-number "${{ github.event.pull_request.number }}"
          --artifact-path dist
          --output .buildchain/web-surface-preview-plan.json

      - name: Configure AWS preview credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::727884401362:role/site-kungfu-tech-preview-github-actions
          aws-region: us-east-1

      - name: Apply preview deploy
        id: preview-apply
        run: >-
          node .buildchain/runtime/scripts/web-surface.mjs
          --mode deploy-apply
          --cwd .
          --plan .buildchain/web-surface-preview-plan.json
          --dry-run false
          --actor "${{ github.actor }}"
          --run-id "${{ github.run_id }}"
          --output .buildchain/web-surface-preview-apply.json

      - name: Comment PR preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: https://pr-${{ github.event.pull_request.number }}.preview.kungfu.tech
        run: |
          {
            echo "### Buildchain preview"
            echo
            echo "[Open preview]($PREVIEW_URL)"
            echo
            echo "- Channel: \`preview\`"
            echo "- Alias: \`pr-${{ github.event.pull_request.number }}\`"
            echo "- Source: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Apply: \`deploy-apply --dry-run false\`"
          } > /tmp/buildchain-preview-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/buildchain-preview-comment.md
