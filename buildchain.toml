schema = 1

[project]
type = "web-surface"
name = "site-kungfu-tech"
site = "kungfu-tech"

[channels.preview]
url_pattern = "https://{alias}.preview.kungfu.tech"
visibility = "ephemeral"
requires_auth = false
noindex = true

[channels.staging]
url = "https://staging.kungfu.tech"
visibility = "protected"
requires_auth = false
access_control = "managed-network"
edge_auth = "none"
noindex = true
promotable = true

[channels.production]
url = "https://kungfu.tech"
visibility = "public"
canonical = true
noindex = false

[deploy.preview]
adapter = "aws-s3-cloudfront"
bucket = "kungfu-tech-preview-727884401362-us-east-1"
cloudfront_distribution = "E1EHEH8NYQ85N3"
artifact_path = "dist"
manifest_prefix = ".buildchain/deployments/preview"
secret_refs = ["AWS_ROLE_ARN"]

[deploy.staging]
adapter = "aws-s3-cloudfront"
bucket = "kungfu-tech-staging-727884401362-us-east-1"
cloudfront_distribution = "EV2PK94F6BHSQ"
artifact_path = "dist"
manifest_prefix = ".buildchain/deployments/staging"
secret_refs = ["AWS_ROLE_ARN"]

[deploy.production]
adapter = "aws-s3-cloudfront"
bucket = "kungfu-tech-site-727884401362-us-east-1"
cloudfront_distribution = "E204MRW1P4Z1G9"
artifact_path = "dist"
manifest_prefix = ".buildchain/deployments/production"
secret_refs = ["AWS_ROLE_ARN"]

[retention.preview]
pr_days = 14
sha_days = 90

[retention.staging]
days = 90
keep_deploys = 10

[retention.production]
days = 365

[security.staging]
requires_auth = false
noindex = true
isolated_providers = true
sandbox_data = true

[lifecycle.build]
command = "bash scripts/build-site.sh"

[lifecycle.verify]
command = "bash scripts/check-site.sh"
